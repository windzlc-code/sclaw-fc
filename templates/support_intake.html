<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>日本不動產購買諮詢申請表｜{{ site_name }}</title>
  <meta name="description" content="填寫日本不動產購買諮詢申請表，提交後由顧問依資料回覆。">
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="/static/site.css?v=20260709-lower-mobile-a">
</head>
<body class="site-home site-case-standalone support-intake-page site-lang-hant">
  {% include 'partials/site_header.html' %}
  <main class="container case-page-suumo support-intake-standalone">
    <header class="suumo-case-brandbar purchase-tools-brandbar">
      <span class="suumo-case-brandbar-logo">站內申請表</span>
      <span class="suumo-case-brandbar-src">購買諮詢 ｜ 顧問接洽 ｜ public</span>
    </header>

    <section class="panel support-intake-standalone-card" aria-labelledby="support-intake-title">
      <div class="support-human-intake" data-support-standalone-intake>
        <div class="support-human-intake-heading">
          <strong id="support-intake-title">日本不動產購買諮詢申請表</strong>
          <span class="muted">填寫後送出給顧問，後續會依資料回覆。</span>
        </div>
        <p class="muted support-human-intake-help">請至少留下電話、LINE、微信或 Email 其中一項，方便顧問接續聯絡。</p>

        <section class="support-human-section support-human-section--static">
          <h3>一、基本資料（必填）</h3>
          <div class="support-human-section-body support-human-section-body--grid">
            <label class="muted support-human-field">姓名<input id="support-page-name" type="text" maxlength="120" autocomplete="name" placeholder="請填寫姓名（必填）"></label>
            <div class="support-human-phone-row">
              <label class="muted support-human-field">電話所在地
                <select id="support-page-phone-region" autocomplete="tel-country-code">
                  <option value="">請選擇電話所在地（有填電話時必選）</option>
                  <option value="+886">台灣 +886</option>
                  <option value="+852">香港 +852</option>
                  <option value="+853">澳門 +853</option>
                  <option value="+86">中國 +86</option>
                  <option value="+81">日本 +81</option>
                  <option value="+65">新加坡 +65</option>
                  <option value="+60">馬來西亞 +60</option>
                  <option value="+1">美國/加拿大 +1</option>
                  <option value="other">其他國家/地區</option>
                </select>
              </label>
              <label class="muted support-human-field">聯絡電話<input id="support-page-phone" type="tel" maxlength="40" autocomplete="tel-national" inputmode="tel" placeholder="請填寫具體電話（選填，聯絡方式至少一項）"></label>
            </div>
            <label class="muted support-human-field">LINE ID<input id="support-page-line" type="text" maxlength="120" placeholder="例：line_id（選填，聯絡方式至少一項）"></label>
            <label class="muted support-human-field">微信 ID<input id="support-page-wechat" type="text" maxlength="120" placeholder="例：wechat_id（選填，聯絡方式至少一項）"></label>
            <label class="muted support-human-field">Email<input id="support-page-email" type="email" maxlength="160" autocomplete="email" placeholder="name@example.com（選填，聯絡方式至少一項）"></label>
          </div>
        </section>

        <section class="support-human-section support-human-section--static">
          <h3>二、需求（必填）</h3>
          <div class="support-human-section-body support-human-section-body--grid">
            <label class="muted support-human-field">購買目的
              <select id="support-page-purpose">
                <option value="">請選擇購買目的（必填）</option>
                <option value="投資收租">投資收租</option>
                <option value="自住 / 度假">自住 / 度假</option>
                <option value="未來移居">未來移居</option>
                <option value="資產配置">資產配置</option>
                <option value="其他">其他</option>
              </select>
            </label>
            <label class="muted support-human-field">其他目的<input id="support-page-purpose-other" type="text" maxlength="160" placeholder="選擇其他時請填寫"></label>
          </div>
        </section>

        <div id="support-page-status" class="muted support-page-status" aria-live="polite"></div>
        <div class="support-human-intake-submit-row support-human-intake-actions">
          <button type="button" class="secondary support-human-intake-submit-btn" id="support-page-submit">確認送出</button>
        </div>
      </div>
    </section>
  </main>
  {% include 'partials/site_footer.html' %}

  <script>
    (function () {
      function field(id) {
        var el = document.getElementById(id);
        return String((el && el.value) || '').trim();
      }
      function normalizePhone(region, rawPhone) {
        var phone = String(rawPhone || '').trim();
        var code = String(region || '').trim();
        if (!phone) return { ok: true, full: '', message: '' };
        if (!code) return { ok: false, full: '', message: '請先選擇電話所在地。' };
        var cleaned = phone.replace(/[^\d+]/g, '');
        if (code === 'other') {
          if (!/^\+\d{7,15}$/.test(cleaned)) return { ok: false, full: '', message: '其他國家/地區請用國際格式，例如 +1 5551234567。' };
          return { ok: true, full: cleaned, message: '' };
        }
        var digits = cleaned.replace(/^\+/, '').replace(/^0+/, '');
        var rules = {
          '+886': [8, 9, '台灣'], '+852': [8, 8, '香港'], '+853': [8, 8, '澳門'], '+86': [10, 11, '中國'],
          '+81': [9, 10, '日本'], '+65': [8, 8, '新加坡'], '+60': [8, 10, '馬來西亞'], '+1': [10, 10, '美國/加拿大']
        };
        var rule = rules[code] || [6, 15, '所選地區'];
        if (!/^\d+$/.test(digits) || digits.length < rule[0] || digits.length > rule[1]) {
          return { ok: false, full: '', message: rule[2] + '電話格式不符合，請重新確認。' };
        }
        return { ok: true, full: code + ' ' + digits, message: '' };
      }
      function clearValidation() {
        var form = document.querySelector('[data-support-standalone-intake]');
        if (!form) return;
        form.querySelectorAll('.support-human-field--invalid, .support-human-phone-row--invalid').forEach(function (el) {
          el.classList.remove('support-human-field--invalid', 'support-human-phone-row--invalid');
        });
        form.querySelectorAll('.support-human-field-error').forEach(function (el) { el.remove(); });
      }
      function markError(ids, message) {
        var list = Array.isArray(ids) ? ids : [ids];
        var first = null;
        var anchor = null;
        list.forEach(function (id) {
          var el = document.getElementById(id);
          if (!el) return;
          if (!first) first = el;
          var field = el.closest('.support-human-field');
          if (field) {
            field.classList.add('support-human-field--invalid');
            anchor = field;
          }
          var row = el.closest('.support-human-phone-row');
          if (row) {
            row.classList.add('support-human-phone-row--invalid');
            anchor = row;
          }
        });
        if (anchor) {
          var err = document.createElement('div');
          err.className = 'support-human-field-error';
          err.textContent = message;
          anchor.appendChild(err);
        }
        if (first && typeof first.focus === 'function') first.focus({ preventScroll: true });
        if (first && first.scrollIntoView) first.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
      async function submit() {
        var status = document.getElementById('support-page-status');
        var btn = document.getElementById('support-page-submit');
        var name = field('support-page-name');
        var phoneRegion = field('support-page-phone-region');
        var phoneLocal = field('support-page-phone');
        var phone = normalizePhone(phoneRegion, phoneLocal);
        var email = field('support-page-email');
        var line = field('support-page-line');
        var wechat = field('support-page-wechat');
        var purpose = field('support-page-purpose');
        var purposeOther = field('support-page-purpose-other');
        var err = '';
        var errIds = [];
        if (!name) { err = '請填寫姓名。'; errIds = ['support-page-name']; }
        else if (!phone.ok) { err = phone.message; errIds = ['support-page-phone-region', 'support-page-phone']; }
        else if (!phone.full && !email && !line && !wechat) {
          err = '請至少填寫電話、LINE、微信或 Email 其中一項，方便顧問聯絡。';
          errIds = ['support-page-phone', 'support-page-line', 'support-page-wechat', 'support-page-email'];
        }
        else if (!purpose) { err = '請選擇購買目的。'; errIds = ['support-page-purpose']; }
        else if (purpose === '其他' && !purposeOther) { err = '請填寫其他購買目的。'; errIds = ['support-page-purpose-other']; }
        clearValidation();
        if (err) {
          if (status) status.textContent = err;
          markError(errIds, err);
          return;
        }
        var questionnaire = {
          form_version: 'jp_property_buy_intake_v2',
          name: name,
          contact_phone: phone.full,
          contact_phone_region_code: phoneRegion,
          contact_phone_local: phoneLocal,
          contact_phone_valid: phone.ok,
          contact_phone_error: phone.message,
          contact_email: email,
          contact_line: line,
          contact_wechat: wechat,
          contact_line_wechat: [line ? 'LINE：' + line : '', wechat ? '微信：' + wechat : ''].filter(Boolean).join('；'),
          purchase_purpose: purpose,
          purchase_purpose_other: purposeOther,
          consent_agreed: true
        };
        var payload = {
          name: name,
          phone: phone.full,
          email: email,
          note: '',
          budget_text: purpose ? '購買目的：' + purpose : '',
          interest_pick_summary: '',
          session_id: '',
          conversation: [],
          questionnaire: questionnaire
        };
        if (status) status.textContent = '送出中…';
        if (btn) btn.disabled = true;
        try {
          var res = await fetch('/api/support/human-intake', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (res.status === 404) {
            res = await fetch('/api/human-handoff-intake', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
          }
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok || data.ok === false) throw new Error(String(data.detail || data.message || '送出失敗'));
          if (status) status.textContent = '已送出，顧問會依資料回覆。';
        } catch (error) {
          if (status) status.textContent = '送出失敗：' + (error && error.message ? error.message : String(error));
        } finally {
          if (btn) btn.disabled = false;
        }
      }
      var btn = document.getElementById('support-page-submit');
      if (btn) btn.addEventListener('click', submit);
    })();
  </script>
  {% include 'partials/support_chat_public_fab.html' %}
</body>
</html>
