    function normalizeSiteLang(lang) {
      const v = String(lang || '').toLowerCase();
      return v === 'hans' || v === 'zh-hans' || v === 'cn' || v === 'simplified' ? 'hans' : 'hant';

    function getInitialSiteLang() {

    function applySiteLanguage(lang) {

        btn.setAttribute('aria-checked', active ? 'true' : 'false');

        el.textContent = pick === 'hans' ? '简' : '繁';

        if (select.value !== pick) select.value = pick;
      });

          ev.preventDefault();
          const root = btn.closest('[data-site-lang-menu-root]');
          const menu = root ? root.querySelector('[data-site-lang-menu]') : null;
          setSiteLanguageMenuOpen(root, !!menu && menu.hidden);
        });
      });
      document.querySelectorAll('[data-site-lang-choice]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const pick = normalizeSiteLang(btn.getAttribute('data-site-lang-choice'));
          applySiteLanguage(pick);
          setSiteLanguageMenuOpen(btn.closest('[data-site-lang-menu-root]'), false);
          try {
            const path = String(window.location.pathname || '');
            if (/^\/zh-(hant|hans)\//i.test(path)) {
              const nextPath = path.replace(/^\/zh-(hant|hans)\//i, `/zh-${pick}/`);
              if (nextPath !== path) window.location.href = nextPath + String(window.location.search || '') + String(window.location.hash || '');
            }
          } catch (_) {}
        });
      });
      document.addEventListener('click', (ev) => {
        document.querySelectorAll('[data-site-lang-menu-root].is-open').forEach((root) => {
          if (!root.contains(ev.target)) setSiteLanguageMenuOpen(root, false);
        });
      });
      document.addEventListener('keydown', (ev) => {
        if (ev.key !== 'Escape') return;
        document.querySelectorAll('[data-site-lang-menu-root].is-open').forEach((root) => setSiteLanguageMenuOpen(root, false));
      });
      document.querySelectorAll('[data-site-lang-select]').forEach((select) => {
        select.addEventListener('change', () => {
          const pick = normalizeSiteLang(select.value);
          applySiteLanguage(pick);
          try {
            const path = String(window.location.pathname || '');
            if (/^\/zh-(hant|hans)\//i.test(path)) {
              const nextPath = path.replace(/^\/zh-(hant|hans)\//i, `/zh-${pick}/`);
              if (nextPath !== path) window.location.href = nextPath + String(window.location.search || '') + String(window.location.hash || '');
            }
          } catch (_) {}
        });
      });
      applySiteLanguage(getInitialSiteLang());
      try {
        const observer = new MutationObserver(() => {
          if (siteLanguageApplying) return;
          window.clearTimeout(siteLanguageObserverTimer);
          siteLanguageObserverTimer = window.setTimeout(() => {
            const pick = typeof window.getSiteLanguagePreference === 'function' ? window.getSiteLanguagePreference() : getInitialSiteLang();
            applySiteLanguageText(pick);
          }, 40);
        });
        observer.observe(document.body, {
          childList: true,
          subtree: true,
          characterData: true,
          attributes: true,
          attributeFilter: HOME_LANG_ATTRS,
        });
      } catch (_) {}
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initSiteLanguageSwitch);
    else initSiteLanguageSwitch();
  })();
</script>
