<script>
  (function () {
    if (window.__sclawSupportWidgetFallbackReady) return;
    window.__sclawSupportWidgetFallbackReady = true;

    var selectedKey = 'sclaw_support_selected_cases_v1';
    var savedKey = 'sclaw_support_saved_cases_v1';
    var selectedChannelKey = 'sclaw_support_selected_cases_channel_v1';
    var savedChannelKey = 'sclaw_support_saved_cases_channel_v1';
    var supportFallbackSelectedChannel = null;
    var supportFallbackSavedChannel = null;
    var supportFallbackOwnsFloatingCases = !(window.renderSupportSelectedCasesPanel || window.renderSupportSavedCasesState);

    function esc(value) {
      return String(value == null ? '' : value).replace(/[&<>"']/g, function (ch) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch] || ch;
      });
    }

    function readList(key) {
      try {
        var value = JSON.parse(localStorage.getItem(key) || '[]');
        return Array.isArray(value) ? value : [];
      } catch (_) {
        return [];
      }
    }

    function writeList(key, list) {
      var payload = Array.isArray(list) ? list : [];
      var oldValue = '';
      var newValue = '';
      try {
        oldValue = localStorage.getItem(key) || '';
        newValue = JSON.stringify(payload);
        localStorage.setItem(key, newValue);
      } catch (_) {}
      try {
        window.dispatchEvent(new StorageEvent('storage', { key: key, oldValue: oldValue, newValue: newValue, storageArea: localStorage }));
      } catch (_) {}
      try {
        if (key === selectedKey) {
          window.dispatchEvent(new CustomEvent('sclaw:selected-cases-updated', { detail: { items: payload, source: 'fallback-widget' } }));
          if (!supportFallbackSelectedChannel && 'BroadcastChannel' in window) supportFallbackSelectedChannel = new BroadcastChannel(selectedChannelKey);
          if (supportFallbackSelectedChannel) supportFallbackSelectedChannel.postMessage({ type: 'selected-cases-updated', source: 'fallback-widget', items: payload });
        } else if (key === savedKey) {
          window.dispatchEvent(new CustomEvent('sclaw:saved-cases-updated', { detail: { items: payload, source: 'fallback-widget' } }));
          if (!supportFallbackSavedChannel && 'BroadcastChannel' in window) supportFallbackSavedChannel = new BroadcastChannel(savedChannelKey);
          if (supportFallbackSavedChannel) supportFallbackSavedChannel.postMessage({ type: 'saved-cases-updated', source: 'fallback-widget', items: payload });
        }
      } catch (_) {}
    }

    function setDisplay(id, open, displayValue) {
      var el = document.getElementById(id);
      if (el) el.style.display = open ? (displayValue || 'block') : 'none';
      return el;
    }

    function setExpanded(id, open) {
      var el = document.getElementById(id);
      if (el) el.setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    function stableKey(item) {
      return String((item && (item.case_key || item.source_item_id || item.content_id || item.item_url || item.url || item.title)) || '');
    }

    function supportFallbackSalesSessionId() {
      var key = 'sclaw_support_sales_session_v1';
      try {
        var cached = localStorage.getItem(key);
        if (cached) return cached;
        var generated = 'sess-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
        localStorage.setItem(key, generated);
        return generated;
      } catch (_) {
        return 'sess-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
      }
    }

    function supportFallbackSanitizePublicCopy(value) {
      return String(value || '')
        .replace(/日本不動產智能客服/g, '日本不動產線上客服')
        .replace(/線上智能客服/g, '線上客服')
        .replace(/智能客服/g, '線上客服')
        .replace(/智能助理/g, '線上客服')
        .replace(/\bAI\s*客服\b/gi, '線上客服')
        .replace(/\bAI\s*助理\b/gi, '線上客服')
        .replace(/\bAI\s*助手\b/gi, '線上客服')
        .replace(/人工智能/gi, '線上客服')
        .replace(/機器人/gi, '線上客服')
        .replace(/机器人/gi, '線上客服')
        .replace(/自動生成/gi, '整理回覆');
    }

    function supportFallbackCompactReply(value) {
      var text = supportFallbackSanitizePublicCopy(value).trim();
      if (!text) return '';
      var blocks = text.split(/\n{2,}/).map(function (block) {
        return String(block || '').trim();
      }).filter(Boolean).filter(function (block) {
        return !/^(?:若需要人工顧問|若想留資料|請輸入「人工」|（已同步給顧問|（顧問通知未送出)/.test(block);
      });
      var compact = blocks[0] || '';
      if (blocks.length > 1) {
        var candidate = blocks[0] + '\n\n' + blocks[1];
        if (candidate.length <= 118) compact = candidate;
      }
      if (compact.length > 118) compact = compact.slice(0, 118).replace(/[，、；：]\S*$/, '').trim() + '…';
      return compact;
    }

    function supportFallbackIntakeCtaHtml() {
      return (
        '<div class="support-chat-intake-cta">' +
          '<span>如果想讓顧問後續接上，我可以先幫您把資料整理好。</span>' +
          '<button type="button" onclick="openSupportHumanIntakeFromSalesMcp({ silent: true })">填寫諮詢表</button>' +
        '</div>'
      );
    }

    function supportFallbackToggleHumanIntakeModal(open, options) {
      var modal = document.getElementById('support-human-intake-modal');
      if (!modal) return;
      if (modal.parentElement && modal.parentElement.id === 'support-chat-widget') {
        document.body.appendChild(modal);
      }
      var on = !!open;
      modal.style.display = on ? 'block' : 'none';
      modal.setAttribute('aria-hidden', on ? 'false' : 'true');
      document.body.classList.toggle('support-human-intake-modal-open', on);
      if (!on) return;
      options = options || {};
      var title = document.getElementById('support-human-intake-modal-title');
      var note = document.getElementById('support-human-intake-modal-note');
      if (title) title.textContent = String(options.title || '日本不動產購買諮詢申請表');
      if (note) note.textContent = String(options.note || '請填寫基本資料，送出後顧問再依資料回覆。');
      window.setTimeout(function () {
        var first = modal.querySelector('input, select, textarea, button');
        if (first) {
          try { first.focus({ preventScroll: true }); } catch (_) { first.focus(); }
        }
      }, 80);
    }

    function supportFallbackHumanIntakeFormHtml() {
      return (
        '<div class="support-human-intake" data-support-human-fallback-form="1">' +
          '<div class="support-human-intake-heading"><strong>日本不動產購買諮詢申請表</strong><span class="muted">填寫聯絡方式後再送出給顧問。</span></div>' +
          '<section class="support-human-section support-human-section--static"><h3>一、基本資料</h3><div class="support-human-section-body support-human-section-body--grid">' +
            '<label class="muted support-human-field">姓名<input id="support-fallback-human-name" type="text" maxlength="120" autocomplete="name" placeholder="請填寫姓名（必填）"></label>' +
            '<div class="support-human-phone-row">' +
              '<label class="muted support-human-field">電話所在地<select id="support-fallback-human-phone-region" autocomplete="tel-country-code"><option value="">請選擇電話所在地（有填電話時必選）</option><option value="+886">台灣 +886</option><option value="+852">香港 +852</option><option value="+853">澳門 +853</option><option value="+86">中國 +86</option><option value="+81">日本 +81</option><option value="+65">新加坡 +65</option><option value="+60">馬來西亞 +60</option><option value="+1">美國/加拿大 +1</option><option value="other">其他國家/地區</option></select></label>' +
              '<label class="muted support-human-field">聯絡電話<input id="support-fallback-human-phone" type="tel" maxlength="40" autocomplete="tel-national" inputmode="tel" placeholder="請填寫具體電話（選填，聯絡方式至少一項）"></label>' +
            '</div>' +
            '<label class="muted support-human-field">LINE ID<input id="support-fallback-human-line" type="text" maxlength="120" placeholder="例：line_id（選填，聯絡方式至少一項）"></label>' +
            '<label class="muted support-human-field">微信 ID<input id="support-fallback-human-wechat" type="text" maxlength="120" placeholder="例：wechat_id（選填，聯絡方式至少一項）"></label>' +
            '<label class="muted support-human-field">Email<input id="support-fallback-human-email" type="email" maxlength="160" autocomplete="email" placeholder="name@example.com（選填，聯絡方式至少一項）"></label>' +
          '</div></section>' +
          '<section class="support-human-section support-human-section--static"><h3>二、需求</h3><div class="support-human-section-body support-human-section-body--grid">' +

    function supportFallbackNormalizePhone(region, rawPhone) {
      var phone = String(rawPhone || '').trim();
      var code = String(region || '').trim();
      if (!phone) return { ok: true, full: '', message: '' };
      if (!code) return { ok: false, full: '', message: '請先選擇電話所在地。' };
      var cleaned = phone.replace(/[^\d+]/g, '');
      if (code === 'other') {
        if (!/^\+\d{7,15}$/.test(cleaned)) return { ok: false, full: '', message: '其他國家/地區請用國際格式，例如 +1 5551234567。' };
        return { ok: true, full: cleaned, message: '' };
      }
      var digits = cleaned.replace(/^\+/, '').replace(/^0+/, '');
      var rules = {
        '+886': [8, 9, '台灣'], '+852': [8, 8, '香港'], '+853': [8, 8, '澳門'], '+86': [10, 11, '中國'],
        '+81': [9, 10, '日本'], '+65': [8, 8, '新加坡'], '+60': [8, 10, '馬來西亞'], '+1': [10, 10, '美國/加拿大']
      };
      var rule = rules[code] || [6, 15, '所選地區'];
      if (!/^\d+$/.test(digits) || digits.length < rule[0] || digits.length > rule[1]) {
        return { ok: false, full: '', message: rule[2] + '電話格式不符合，請重新確認。' };
      }
      return { ok: true, full: code + ' ' + digits, message: '' };
    }

      if (keep !== 'selected' && typeof window.toggleSupportSelectedCasesDrawer === 'function') window.toggleSupportSelectedCasesDrawer(false);
      if (keep !== 'saved' && typeof window.toggleSupportSavedCasesDrawer === 'function') window.toggleSupportSavedCasesDrawer(false);
      if (keep !== 'chat' && typeof window.toggleSupportChat === 'function') window.toggleSupportChat(false);
    }

    if (typeof window.toggleSupportSelectedCasesDrawer !== 'function') {
      window.toggleSupportSelectedCasesDrawer = function (force) {
        var drawer = document.getElementById('support-selected-cases-drawer');
        var open = typeof force === 'boolean' ? force : !(drawer && drawer.style.display !== 'none' && drawer.style.display !== '');
        if (open) closeSupportFallbackPanels('selected');
        setDisplay('support-selected-cases-drawer', open, 'flex');
        setDisplay('support-selected-cases-drawer-backdrop', open, 'block');
        setExpanded('support-selected-cases-fab', open);
        document.body.classList.toggle('support-selected-cases-open', open);
        if (open) renderCaseList(selectedKey, 'support-selected-cases-drawer-list', '尚未加入案件。可在智慧查詢結果點選加號加入案件對比。');
        refreshSupportFallbackBadges();
      };
    }

    if (typeof window.toggleSupportSavedCasesDrawer !== 'function') {
      window.toggleSupportSavedCasesDrawer = function (force) {
        var drawer = document.getElementById('support-saved-cases-drawer');
        var open = typeof force === 'boolean' ? force : !(drawer && drawer.style.display !== 'none' && drawer.style.display !== '');
        if (open) closeSupportFallbackPanels('saved');
        setDisplay('support-saved-cases-drawer', open, 'flex');
        setDisplay('support-saved-cases-drawer-backdrop', open, 'block');
        setExpanded('support-saved-cases-fab', open);
        document.body.classList.toggle('support-saved-cases-open', open);
        if (open) renderCaseList(savedKey, 'support-saved-cases-drawer-list', '尚未收藏案件。可在智慧查詢結果點選愛心收藏。');
        refreshSupportFallbackBadges();
      };
    }

    if (typeof window.toggleSupportChat !== 'function') {
      window.toggleSupportChat = function (force) {
        var panel = document.getElementById('support-chat-panel');
        var widget = document.getElementById('support-chat-widget');
        var open = typeof force === 'boolean' ? force : !(panel && panel.style.display !== 'none' && panel.style.display !== '');
        if (open) closeSupportFallbackPanels('chat');
        setDisplay('support-chat-panel', open, 'flex');
        setDisplay('support-chat-backdrop', open, 'block');
        setExpanded('support-chat-toggle', open);
        if (panel) {
          panel.classList.toggle('is-chat-visible', open);
          panel.classList.toggle('is-chat-hiding', false);
          panel.setAttribute('aria-hidden', open ? 'false' : 'true');
        }
        if (widget) widget.classList.toggle('is-expanded', open);
        if (open) {
          renderSupportFallbackChatMessages();
          hydrateSupportFallbackWelcome();
          var input = document.getElementById('support-chat-input');
          if (input) {
            setTimeout(function () {
              try { input.focus({ preventScroll: true }); } catch (_) { input.focus(); }
            }, 30);
          }
        }
      };
    }

    window.openSupportSelectedCasesComparePage = window.openSupportSelectedCasesComparePage || function () {
      window.location.href = '/selected-cases-compare';
    };

    window.clearSupportSelectedCases = window.clearSupportSelectedCases || function () {
      writeList(selectedKey, []);
      renderCaseList(selectedKey, 'support-selected-cases-drawer-list', '尚未加入案件。可在智慧查詢結果點選加號加入案件對比。');
      refreshSupportFallbackBadges();
    };

    window.clearSupportSavedCases = window.clearSupportSavedCases || function () {
      writeList(savedKey, []);
      renderCaseList(savedKey, 'support-saved-cases-drawer-list', '尚未收藏案件。可在智慧查詢結果點選愛心收藏。');
      refreshSupportFallbackBadges();
    };

    window.removeSupportFloatingCaseByBtn = window.removeSupportFloatingCaseByBtn || function (btn) {
      var key = btn && btn.getAttribute('data-case-key');
      var storageKey = btn && btn.getAttribute('data-storage-key');
      if (!key || !storageKey) return;
      writeList(storageKey, readList(storageKey).filter(function (item) { return stableKey(item) !== key; }));
      renderCaseList(storageKey, storageKey === selectedKey ? 'support-selected-cases-drawer-list' : 'support-saved-cases-drawer-list', storageKey === selectedKey ? '尚未加入案件。可在智慧查詢結果點選加號加入案件對比。' : '尚未收藏案件。可在智慧查詢結果點選愛心收藏。');
      refreshSupportFallbackBadges();
    };

    window.toggleSupportChatMenu = window.toggleSupportChatMenu || function (force) {
      var menu = document.getElementById('support-chat-menu');
      var open = typeof force === 'boolean' ? force : !!(menu && menu.hidden);
      if (menu) menu.hidden = !open;
      setExpanded('support-chat-menu-toggle', open);
    };

    window.openSupportChatMenuCases = window.openSupportChatMenuCases || function () {
      window.toggleSupportChatMenu(false);
      window.toggleSupportSelectedCasesDrawer(true);
    };

    window.openSupportChatHistoryPanel = window.openSupportChatHistoryPanel || function (force) {
      var panel = document.getElementById('support-chat-history-panel');
      var open = typeof force === 'boolean' ? force : !(panel && panel.style.display !== 'none' && panel.style.display !== '');
      setDisplay('support-chat-history-panel', open, 'block');
    };

    window.toggleSupportChatHistoryPanel = window.toggleSupportChatHistoryPanel || window.openSupportChatHistoryPanel;
    window.toggleSupportChatSpeech = window.toggleSupportChatSpeech || function () {};
    window.renderSupportKbHistoryList = window.renderSupportKbHistoryList || function () {};
    window.clearSupportKbHistory = window.clearSupportKbHistory || function () {};
    window.refreshSupportFloatingCaseState = window.refreshSupportFloatingCaseState || refreshSupportFloatingCaseState;

    window.sendSupportChat = window.sendSupportChat || async function () {
      var input = document.getElementById('support-chat-input');
      var text = input ? String(input.value || '').trim() : '';
      var image = supportFallbackPendingImage;
      if (!text && !image) return;
      input.value = '';
      window.clearSupportChatPendingImage();
      supportFallbackHistory = supportFallbackHistory.filter(function (row) { return !(row && row.transientWelcome); });
      supportFallbackHistory.push({ role: 'user', content: text || '請幫我看這張圖片。', image: image });
      renderSupportFallbackChatMessages();
      var humanHandoffText = /(人工|真人|專人|专人|顧問|顾问|業務|业务|銷售|销售|仲介|經紀|经纪)/.test(text);
      setSupportFallbackThinking(true, humanHandoffText || /買房|买房|看屋|看房/.test(text) ? '正在整理顧問諮詢方向…' : '顧問正在整理回覆…');
      try {
        var suppressSelectedCases = !!window.__sclawSupportSuppressSelectedCasesOnce;
        if (suppressSelectedCases) window.__sclawSupportSuppressSelectedCasesOnce = false;
        var inlineCaseContext = null;
        try {
          if (window.__sclawSupportCaseContextOnce && typeof window.__sclawSupportCaseContextOnce === 'object') {
            inlineCaseContext = window.__sclawSupportCaseContextOnce;
            window.__sclawSupportCaseContextOnce = null;
          }
        } catch (_) {
          window.__sclawSupportCaseContextOnce = null;
        }
        var selectedCases = inlineCaseContext ? [inlineCaseContext] : (suppressSelectedCases ? [] : readList(selectedKey).slice(0, 20));
        var history = supportFallbackHistory
          .filter(function (row) { return row && row.role && !row.supportWelcome; })
          .slice(0, -1)
          .slice(-12)
          .map(function (row) { return { role: row.role, content: String(row.content || '') }; });
        var res = await fetch('/api/ai/chat-support', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text || '請幫我看這張圖片。',
            history: history,
            use_knowledge: !humanHandoffText,
            knowledge_query: text || '圖片諮詢',
            image_data_url: image && image.data_url ? image.data_url : '',
            image_name: image && image.name ? image.name : '',
            image_type: image && image.type ? image.type : '',
            sales_session_id: supportFallbackSalesSessionId(),
            selected_cases: selectedCases,
            persona_region: 'tw',
            knowledge_days: 72,
            knowledge_merged_max: 26,
            knowledge_zh_variant: (typeof window.getSiteLanguagePreference === 'function' && window.getSiteLanguagePreference() === 'hans') ? 'hans' : 'hant'
          })
        });
        var data = await res.json().catch(function () { return {}; });
        if (data && data.session_id) {
          try { localStorage.setItem('sclaw_support_sales_session_v1', String(data.session_id)); } catch (_) {}
        }
        if (!res.ok || (data && data.ok === false)) {
          var d = data && (data.detail || data.error || data.message);
          var msg = typeof d === 'string' ? d : ('請求失敗（HTTP ' + res.status + '），請稍後再試。');
          supportFallbackHistory.push({ role: 'assistant', content: msg });
        } else {
          var reply = data && (data.reply || data.detail || '已收到，我這邊先幫您整理。');
          supportFallbackHistory.push({
            role: 'assistant',
            content: supportFallbackSanitizePublicCopy(typeof reply === 'string' ? reply : String(reply)),
            image: data && data.reply_image_data_url ? { data_url: data.reply_image_data_url, name: '客服回傳圖片' } : null
          });
        }
      } catch (_) {
        supportFallbackHistory.push({ role: 'assistant', content: '連線失敗，請稍後再試。' });
      } finally {
        setSupportFallbackThinking(false);
        if (supportFallbackHistory.length > 24) supportFallbackHistory = supportFallbackHistory.slice(-24);
        renderSupportFallbackChatMessages();
      }
    };

    document.addEventListener('click', function (event) {
      var btn = event.target && event.target.closest ? event.target.closest('[data-support-quick-prompt]') : null;
      if (!btn) return;
      var input = document.getElementById('support-chat-input');
      if (!input) return;
      event.preventDefault();
      input.value = String(btn.getAttribute('data-support-quick-prompt') || '').trim();
      try { input.focus({ preventScroll: true }); } catch (_) { input.focus(); }
      if (btn.getAttribute('data-support-quick-send') === '1' && typeof window.sendSupportChat === 'function') {
        window.sendSupportChat();
      }
    });

    window.addEventListener('sclaw:selected-cases-updated', function () {
      refreshSupportFloatingCaseState(selectedKey);
    });
    window.addEventListener('sclaw:saved-cases-updated', function () {
      refreshSupportFloatingCaseState(savedKey);
    });
    window.addEventListener('storage', function (ev) {
      if (!ev || ev.key === selectedKey || ev.key === savedKey) refreshSupportFloatingCaseState(ev && ev.key);
    });
    try {
      if ('BroadcastChannel' in window) {
        supportFallbackSelectedChannel = new BroadcastChannel(selectedChannelKey);
        supportFallbackSelectedChannel.addEventListener('message', function (ev) {
          if (ev && ev.data && ev.data.type === 'selected-cases-updated' && ev.data.source !== 'fallback-widget') {
            refreshSupportFloatingCaseState(selectedKey);
          }
        });
        supportFallbackSavedChannel = supportFallbackSavedChannel || new BroadcastChannel(savedChannelKey);
        supportFallbackSavedChannel.addEventListener('message', function (ev) {
          if (ev && ev.data && ev.data.type === 'saved-cases-updated' && ev.data.source !== 'fallback-widget') {
            refreshSupportFloatingCaseState(savedKey);
          }
        });
      }
    } catch (_) {}

    refreshSupportFloatingCaseState();
  })();
</script>
