<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>已選案件對比｜{{ site_name }}</title>
  <link rel="stylesheet" href="/static/site.css?v=20260619-selected-sync-a">
</head>
<body class="selected-compare-body site-lang-hant">
  <main class="selected-compare-page">
    <header class="selected-compare-hero">
      <div class="selected-compare-title">
        <h1>已選房源對比</h1>
        <p><strong id="selected-compare-count">0</strong> 筆房源 · <strong id="selected-compare-field-count">0</strong> 個欄位 · <span id="selected-compare-status">讀取中</span></p>
      </div>
      <div class="selected-compare-actions">
        {% include 'partials/site_language_switch.html' %}
        <label class="selected-compare-annotation-toggle">
          <input id="selected-compare-annotation-toggle" type="checkbox" checked>
          <span>顯示優勢標註</span>
        </label>
        <button type="button" class="secondary" onclick="window.location.href='/'">返回首頁</button>
        <button id="selected-compare-refresh" type="button" class="primary" onclick="hydrateAndRenderSelectedCompare(true)">重新整理資料</button>
      </div>
    </header>

    <section id="selected-compare-empty" class="selected-compare-empty" hidden>
      <strong>暫無收藏案件</strong>
      <p>請回到首頁智慧查詢結果中點選心型收藏，再點右側收藏清單的「開始對比」。</p>
      <button type="button" class="primary" onclick="window.location.href='/'">回首頁選案件</button>
    </section>

    <section class="selected-compare-section selected-compare-advantage-section">
      <div class="selected-compare-section-head">
        <div><h2>優勢項</h2></div>
      </div>
      <div id="selected-compare-advantage-list" class="selected-compare-advantage-list"></div>
    </section>

    <section id="selected-compare-gallery-section" class="selected-compare-section selected-compare-gallery-section">
      <div class="selected-compare-section-head">
        <div><h2>圖片對比</h2></div>
      </div>
      <div id="selected-compare-cards" class="selected-compare-cards" aria-label="已選房源圖片對照"></div>
    </section>

    <section id="selected-compare-floorplan-section" class="selected-compare-section selected-compare-floorplan-section" hidden>
      <div class="selected-compare-section-head">
        <div><h2>房型圖對比</h2></div>
      </div>
      <div id="selected-compare-floorplans" class="selected-compare-floorplans" aria-label="房型圖對照"></div>
    </section>

    <section id="selected-compare-detail-section" class="selected-compare-section">
      <div class="selected-compare-section-head">
        <div><h2>詳細參數</h2></div>
      </div>
      <div id="selected-compare-table-groups" class="selected-compare-table-groups"></div>
    </section>

  </main>
  <script src="/static/selected-cases-compare.js?v=20260619-selected-sync-a"></script>
</body>
</html>
