version: "3.9"

services:
  app:
    build: .
    container_name: sclaw_app
    restart: unless-stopped
    environment:
      - SITE_NAME=${SITE_NAME:-日本不動產全球指定搜尋網}
      - BRAND_NAME=${BRAND_NAME:-}
      - SITE_URL=${SITE_URL:-https://www.manuvip.com}
      - SCLAW_ENABLE_BACKGROUND_WORKERS=${SCLAW_ENABLE_BACKGROUND_WORKERS:-0}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-1}
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
      - ./logs:/app/logs
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: sclaw_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
