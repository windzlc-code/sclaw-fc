version: "3.9"

services:
  app:
    build: .
    container_name: sclaw_app
    restart: unless-stopped
    environment:
      - SITE_NAME=${SITE_NAME:-日本不動產全球指定搜尋網}
      - BRAND_NAME=${BRAND_NAME:-}
      - SITE_URL=${SITE_URL:-https://www.manuvip.com}
      - SCLAW_ENABLE_BACKGROUND_WORKERS=${SCLAW_ENABLE_BACKGROUND_WORKERS:-0}
      - SCLAW_PORTAL_SEARCH_CACHE_TTL=${SCLAW_PORTAL_SEARCH_CACHE_TTL:-120}
      - SCLAW_PORTAL_SEARCH_PREWARM=${SCLAW_PORTAL_SEARCH_PREWARM:-0}
      - SCLAW_PORTAL_TYPE_SEARCH_PREWARM=${SCLAW_PORTAL_TYPE_SEARCH_PREWARM:-0}
      - SCLAW_HOME_STARTUP_PREWARM=${SCLAW_HOME_STARTUP_PREWARM:-0}
      - SCLAW_PORTAL_SEARCH_PREWARM_REGIONS=${SCLAW_PORTAL_SEARCH_PREWARM_REGIONS:-北海道,東北,關東,甲信越,北陸,東海,關西,中國地方,四國,九州,沖繩,東京,神奈川,大阪,福岡}
      - SCLAW_PORTAL_SEARCH_LIVE_BACKFILL=${SCLAW_PORTAL_SEARCH_LIVE_BACKFILL:-0}
      - SCLAW_PERSIST_LIVE_ENRICH=${SCLAW_PERSIST_LIVE_ENRICH:-0}
      - SCLAW_CACHE_MAINTENANCE=${SCLAW_CACHE_MAINTENANCE:-1}
      - SCLAW_CACHE_MAINTENANCE_INTERVAL_SEC=${SCLAW_CACHE_MAINTENANCE_INTERVAL_SEC:-21600}
      - SCLAW_CACHE_MAINTENANCE_INITIAL_DELAY_SEC=${SCLAW_CACHE_MAINTENANCE_INITIAL_DELAY_SEC:-45}
      - SCLAW_CACHE_MAINTENANCE_LOCK_STALE_SEC=${SCLAW_CACHE_MAINTENANCE_LOCK_STALE_SEC:-900}
      - SCLAW_CACHE_MAINTENANCE_MAX_DELETE_FILES=${SCLAW_CACHE_MAINTENANCE_MAX_DELETE_FILES:-12000}
      - SCLAW_CACHE_CASE_IMAGES_MAX_AGE_DAYS=${SCLAW_CACHE_CASE_IMAGES_MAX_AGE_DAYS:-45}
      - SCLAW_CACHE_CASE_IMAGES_MAX_BYTES=${SCLAW_CACHE_CASE_IMAGES_MAX_BYTES:-6442450944}
      - SCLAW_CACHE_CASE_THUMBS_MAX_AGE_DAYS=${SCLAW_CACHE_CASE_THUMBS_MAX_AGE_DAYS:-14}
      - SCLAW_CACHE_CASE_THUMBS_MAX_BYTES=${SCLAW_CACHE_CASE_THUMBS_MAX_BYTES:-1610612736}
      - SCLAW_CACHE_HOME_POSTERS_MAX_AGE_DAYS=${SCLAW_CACHE_HOME_POSTERS_MAX_AGE_DAYS:-30}
      - SCLAW_CACHE_HOME_POSTERS_MAX_BYTES=${SCLAW_CACHE_HOME_POSTERS_MAX_BYTES:-536870912}
      - SCLAW_INDEX_HTML_CACHE_TTL=${SCLAW_INDEX_HTML_CACHE_TTL:-86400}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
    volumes:
      - ./static:/app/static
      - ./data:/app/data
      - ./exports:/app/exports
      - ./logs:/app/logs
    expose:
      - "8000"

  caddy:
    image: caddy:2.10
    container_name: sclaw_caddy
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - DOMAIN=${DOMAIN:-manuvip.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./static:/srv/sclaw_fz_static:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
